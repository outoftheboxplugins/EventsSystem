stages:
  - prepare
  - build
  - deploy

prepare-job:
  stage: prepare
  tags:
    - windows
    - unreal
  script:
    - Write-Host "Prepare environment"
    - cd D:/versions/4.27
    - Copy-Item -Path "$CI_PROJECT_DIR" -Destination ".\Engine\Plugins\Marketplace\" -Recurse
    - .\Setup.bat --force
    - .\GenerateProjectFiles.bat

build-job:       
  stage: build
  tags:
    - windows
    - unreal
  script:
    - Write-Host "Starting to build"
    - .\Engine\Binaries\DotNET\UnrealBuildTool.exe UE4Editor Win64 Development
   
deploy-job:  
  stage: deploy
  tags:
    - windows
    - unreal
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
