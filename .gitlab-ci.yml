stages:
  - prepare
  - deploy

prepare-job:
  stage: prepare
  tags:
    - windows
    - unreal
  script:
    - Write-Host "Switching to engine environment"
    - cd D:/versions/4.26

    - Write-Host "Updating to latest engine version"
    - git checkout .
    - Copy-Item -Path "$CI_PROJECT_DIR" -Destination ".\Engine\Plugins\Marketplace\$CI_PROJECT_NAME" -Recurse
    - ((Get-Content -path Setup.bat -Raw) -replace '/register','/register /unattended') | Set-Content -Path Setup.bat
    - .\Setup.bat --force
    
    - Write-Host "Starting build"
    - .\GenerateProjectFiles.bat
    - .\Engine\Binaries\DotNET\UnrealBuildTool.exe UE4Editor Win64 Development
  
deploy-job:  
  stage: deploy
  tags:
    - windows
    - unreal
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
