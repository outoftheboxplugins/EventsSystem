stages:
  - prepare
  - build
  - deploy

prepare-job:
  stage: prepare
  tags:
    - windows
    - unreal
  script:
    - Write-Host "Prepare environment"
    - Copy-Item -Path "C:\Logfiles" -Destination "C:\Drawings\Logs" -Recurse
    - cd D:/versions/4.27
    - .\Setup.bat --force
    - .\GenerateProjectFiles.bat

build-job:       
  stage: build
  tags:
  - windows
  script:
    - Write-Host "Starting to build"
   
deploy-job:  
  stage: deploy
  tags:
  - windows
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
